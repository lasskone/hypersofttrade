[build]
  builder = "NIXPACKS"

[[services]]
  name = "frontend"
  source = "frontend"

  [services.build]
    buildCommand = "npm run build"

  [services.deploy]
    startCommand = "npm run start"
    healthcheckPath = "/"
    healthcheckTimeout = 30

[[services]]
  name = "backend"
  source = "backend"

  [services.build]
    buildCommand = "pip install -r requirements.txt"

  [services.deploy]
    startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthcheckPath = "/health"
    healthcheckTimeout = 30
