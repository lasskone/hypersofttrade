[[services]]
  name = "backend"

  [services.source]
    rootDir = "backend"

  [services.build]
    builder = "NIXPACKS"

  [services.deploy]
    startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
    restartPolicyType = "ON_FAILURE"

[[services]]
  name = "frontend"

  [services.source]
    rootDir = "frontend"

  [services.build]
    builder = "NIXPACKS"

  [services.deploy]
    startCommand = "npm start"
    restartPolicyType = "ON_FAILURE"
